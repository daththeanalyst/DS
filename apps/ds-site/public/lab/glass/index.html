<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>DS2 — Glass + Mirror Shine Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --silver: #A6A6A6;
    --ghost: #6E6E6E;
    --hairline: rgba(255,255,255,0.08);
  }
  html, body {
    height: 100%;
    background: #060606;
    color: #F5F5F5;
    font-family: "Inter", ui-sans-serif, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  /*
   * Layer 1 — the glass / piano-black base. A subtle gradient that suggests
   * polished obsidian: a soft horizon-light at the top, deepening to near-
   * black at the bottom, with a faint side glow on each edge.
   */
  .glass-base {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      /* very subtle ambient horizon */
      radial-gradient(ellipse 120vw 60vh at 50% -10%, rgba(255,255,255,0.04), transparent 60%),
      /* edge falloff */
      radial-gradient(ellipse at center, oklch(0.10 0 0) 0%, oklch(0.04 0 0) 100%);
  }
  /*
   * Specular streak — a single diagonal line of light that sweeps across the
   * polished surface as the cursor moves. Two layers stacked: a wide soft
   * halo line (slow lerp, lots of blur) and a thin bright core line (fast
   * lerp, tight) so the streak feels like a polished surface catching ambient
   * light, not a wand. Both at fixed 62° rotation — the angle of a glancing
   * reflection from an off-frame upper-left light source.
   */
  .shine, .shine-core {
    position: fixed;
    left: 50%; top: 50%;
    pointer-events: none;
    will-change: left, top;
    mix-blend-mode: screen;
    transform-origin: 50% 50%;
    transition: opacity 0.3s ease;
  }
  .shine {
    z-index: 1;
    width: 200vmax;
    height: 240px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      transparent 38%,
      rgba(255,255,255,0.08) 45%,
      rgba(255,255,255,0.28) 50%,
      rgba(255,255,255,0.08) 55%,
      transparent 62%,
      transparent 100%
    );
    filter: blur(28px);
    transform: translate(-50%, -50%) rotate(62deg);
  }
  .shine-core {
    z-index: 2;
    width: 200vmax;
    height: 60px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      transparent 46%,
      rgba(255,255,255,0.55) 50%,
      transparent 54%,
      transparent 100%
    );
    filter: blur(3px);
    transform: translate(-50%, -50%) rotate(62deg);
  }
  body.cursor-gone .shine,
  body.cursor-gone .shine-core { opacity: 0; }

  /* Hero on top */
  .hero {
    position: fixed;
    inset: 0;
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    pointer-events: none;
  }
  .hero img {
    width: min(46vw, 440px);
    height: auto;
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.6));
  }
  .hero .tag1 {
    font-family: "Orbitron", sans-serif;
    font-weight: 600;
    font-size: clamp(11px, 1.1vw, 14px);
    color: #F5F5F5;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    padding-left: 0.42em;
  }
  .hero .tag2 {
    font-family: "Orbitron", sans-serif;
    font-weight: 500;
    font-size: clamp(9px, 0.9vw, 11px);
    color: var(--silver);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    padding-left: 0.5em;
  }
  .lab-info {
    position: fixed;
    bottom: 12px; right: 12px;
    z-index: 6;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ghost);
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(8px);
    border: 1px solid var(--hairline);
    padding: 6px 10px;
    border-radius: 999px;
  }
  .lab-info a { color: var(--silver); text-decoration: none; }
  .lab-info a:hover { color: #F5F5F5; }
</style>
</head>
<body class="cursor-gone">

<div class="glass-base" aria-hidden="true"></div>
<div class="shine" id="shine" aria-hidden="true"></div>
<div class="shine-core" id="shine-core" aria-hidden="true"></div>

<div class="hero" id="hero" aria-hidden="true">
  <img src="/logos/ds2-logo.png" alt="DS2" />
  <div class="tag1">Digital Solutions</div>
  <div class="tag2">consulting</div>
</div>

<div class="lab-info">ds2 / lab / glass · <a href="/lab">↩ all variants</a></div>

<script>
(() => {
  const params = new URLSearchParams(window.location.search);
  if (params.get("bgOnly") === "1") {
    document.getElementById("hero")?.style.setProperty("display", "none");
    document.querySelector(".lab-info")?.style.setProperty("display", "none");
  }

  const shine = document.getElementById("shine");
  const core  = document.getElementById("shine-core");
  // Two layers, each with its own lerp so the big halo trails further than
  // the bright core — gives the highlight a feeling of mass / inertia.
  let tx = window.innerWidth / 2, ty = window.innerHeight / 2;
  let hx = tx, hy = ty;     // halo position (slow follower)
  let cx = tx, cy = ty;     // core position (fast follower)

  window.addEventListener("pointermove", e => {
    document.body.classList.remove("cursor-gone");
    tx = e.clientX; ty = e.clientY;
  });
  window.addEventListener("pointerleave", () => document.body.classList.add("cursor-gone"));

  function frame() {
    hx += (tx - hx) * 0.10;
    hy += (ty - hy) * 0.10;
    cx += (tx - cx) * 0.30;
    cy += (ty - cy) * 0.30;
    shine.style.left = hx + "px"; shine.style.top = hy + "px";
    core.style.left  = cx + "px"; core.style.top  = cy + "px";
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
